name: Deploy spectrum-rights to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'spectrum-rights/**'
      - '.github/workflows/deploy-spectrum-rights.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-spectrum-rights
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: spectrum-rights/package-lock.json

      - name: Install dependencies
        working-directory: spectrum-rights
        run: npm ci

      - name: Build
        working-directory: spectrum-rights
        run: npm run build

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: spectrum-rights/dist
          commit_message: 'Deploy spectrum-rights: ${{ github.event.head_commit.message || github.sha }}'
